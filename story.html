<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X News</title>
    <script type="module" src="https://unpkg.com/lit@3/index.js"></script>
  <script type="module" crossorigin src="/assets/lit-language-CGmcNQo9.js"></script>
  <script type="module" crossorigin src="/assets/lit-header-hSyXkQIe.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/story-Dim711tc.css">
</head>

<body>
    <lit-header></lit-header>
    <div class="container">
        <!-- 顶部：文章信息与相关图片融合 -->
        <header class="story-header-with-images">
            <div class="story-info">
                <div class="story-meta">
                    <span id="article-count"></span>
                    <span id="story-ago"></span>
                </div>
                <h1 id="story-title"></h1>
                <p id="story-subtitle"></p>
            </div>
            <div class="header-images">
                <div id="images-grid"></div>
            </div>
        </header>

        <!-- 主要内容：概要与引用源左右布局 -->
        <main class="story-content">
            <div class="content-layout">
                <section class="overview-section">
                    <ul id="overview-list"></ul>
                </section>

                <section class="articles-section">
                    <div id="articles-list"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        // 获取故事ID - 支持新的路径格式和旧的查询参数格式
        function getStoryId() {
            // 首先尝试从路径中获取 (新格式: /story/story-id)
            const pathMatch = window.location.pathname.match(/^\/story\/(.+)$/);
            if (pathMatch) {
                return pathMatch[1];
            }

            // 然后尝试从查询参数获取 (兼容旧格式和vite重写格式)
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('__story') || urlParams.get('s');
        }

        // 加载故事数据
        async function loadStoryData() {
            const storyId = getStoryId();
            if (!storyId) {
                document.body.innerHTML = '<div class="error">未找到故事ID</div>';
                return;
            }

            try {
                const oss_url = "https://cdn.newsora.net/assets";
                // 根据当前语言设置确定数据路径
                const currentLanguage = localStorage.getItem('language') || 'zh-CN';
                const dataPath = currentLanguage === 'zh-CN' ? '/json/zh-CN' : '/json/en';

                const response = await fetch(`${oss_url}${dataPath}/story/${storyId}.json`);
                if (!response.ok) {
                    throw new Error('故事数据加载失败');
                }
                const data = await response.json();
                renderStoryData(data);
            } catch (error) {
                console.error('加载故事数据时出错:', error);
                document.body.innerHTML = '<div class="error">加载故事数据失败</div>';
            }
        }

        // 渲染故事数据
        function renderStoryData(data) {
            // 设置标题和元信息
            document.getElementById('story-title').textContent = data.title;
            document.getElementById('story-subtitle').textContent = data.sub_title;
            document.getElementById('article-count').textContent = `${data.article_count} ARTICLES`;
            document.getElementById('story-ago').textContent = data.ago.toUpperCase();
            document.title = 'X News - ' + data.title;

            // 渲染概要
            const overviewList = document.getElementById('overview-list');
            data.overview.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                overviewList.appendChild(li);
            });

            // 渲染图片
            const imagesGrid = document.getElementById('images-grid');
            data.images.forEach(image => {
                const imageItem = document.createElement('div');
                imageItem.className = 'image-item';
                imageItem.innerHTML = `
                    <img src="${image.src}" alt="image" loading="lazy">
                    <div class="image-source">
                        <img src="${image.logo}" alt="source" class="source-logo">
                    </div>
                `;
                imagesGrid.appendChild(imageItem);
            });

            // 渲染文章列表
            const articlesList = document.getElementById('articles-list');
            data.articles.forEach(article => {
                const articleItem = document.createElement('div');
                articleItem.className = 'article-item';
                articleItem.innerHTML = `
                    <a href="${article.link}" target="_blank" rel="noopener noreferrer">
                        <div class="article-content">
                            <div class="article-meta">
                                <div class="article-source">
                                    <img src="${article.img}" alt="${article.site_name}" loading="lazy">
                                    <span class="site-name">${article.site_name.toUpperCase()}</span>
                                </div>
                                ${article.site_ago ? `<span class="site-ago">${article.site_ago.toUpperCase()}</span>` : ''}
                            </div>
                            <p>${article.title}</p>
                        </div>
                    </a>
                `;
                articlesList.appendChild(articleItem);
            });
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadStoryData);
    </script>
</body>

</html>
